<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">GIF Player logo</title>
  <desc id="desc">A layered Wayland window with a play symbol and animated frame marks.</desc>
  <defs>
    <linearGradient id="background" x1="72" y1="54" x2="442" y2="458" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="0.5" stop-color="#6366f1"/>
      <stop offset="1" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="glass" x1="152" y1="142" x2="363" y2="367" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffffff" stop-opacity="0.96"/>
      <stop offset="1" stop-color="#e0e7ff" stop-opacity="0.82"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#111827" flood-opacity="0.28"/>
    </filter>
  </defs>

  <rect x="28" y="28" width="456" height="456" rx="116" fill="url(#background)"/>
  <path d="M102 170c0-25 20-45 45-45h204c25 0 45 20 45 45v194c0 25-20 45-45 45H147c-25 0-45-20-45-45V170Z" fill="#111827" opacity="0.18" transform="translate(18 -18)"/>
  <rect x="102" y="116" width="294" height="294" rx="58" fill="#111827" opacity="0.2"/>

  <g filter="url(#shadow)">
    <rect x="126" y="102" width="260" height="284" rx="48" fill="#111827" opacity="0.9"/>
    <rect x="145" y="121" width="222" height="246" rx="34" fill="url(#glass)"/>
  </g>

  <circle cx="174" cy="151" r="8" fill="#38bdf8"/>
  <circle cx="200" cy="151" r="8" fill="#818cf8"/>
  <circle cx="226" cy="151" r="8" fill="#c084fc"/>

  <path d="M230 205c0-13 14-21 25-14l89 55c11 7 11 23 0 30l-89 55c-11 7-25-1-25-14V205Z" fill="#4f46e5"/>
  <path d="M246 217v88l71-44-71-44Z" fill="#ffffff"/>

  <rect x="169" y="329" width="44" height="10" rx="5" fill="#38bdf8"/>
  <rect x="221" y="329" width="44" height="10" rx="5" fill="#6366f1"/>
  <rect x="273" y="329" width="44" height="10" rx="5" fill="#a855f7"/>
  <circle cx="338" cy="334" r="5" fill="#c084fc"/>

  <path d="M116 224H84c-9 0-16 7-16 16v80c0 9 7 16 16 16h32" fill="none" stroke="#ffffff" stroke-opacity="0.72" stroke-width="14" stroke-linecap="round"/>
  <path d="M396 190h32c9 0 16 7 16 16v80c0 9-7 16-16 16h-32" fill="none" stroke="#ffffff" stroke-opacity="0.72" stroke-width="14" stroke-linecap="round"/>
